name: Strict mTLS Enforcement

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - staging

jobs:
  strict-mtls:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run repo-provided strict mTLS validator (if available)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm ci
            if node -e "const fs=require('fs');const p=require('./package.json');process.exit(p.scripts&&p.scripts['validate:strict-mtls']?0:1)"; then
              npm run validate:strict-mtls
            else
              echo "No validate:strict-mtls script; continuing with baseline checks."
            fi
          else
            echo "No package.json; continuing with baseline checks."
          fi

      - name: Enforce strict mTLS baseline
        shell: bash
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY##*/}"

          # 1) Never allow PERMISSIVE in mesh policies tracked in git.
          if rg -n "mode:\s*PERMISSIVE" k8s security docs --glob '*.{yaml,yml,md}' 2>/dev/null; then
            echo "PERMISSIVE mTLS detected in tracked config/doc files."
            exit 1
          fi

          # 2) Critical Wave-0 platform repos must evidence STRICT mode in source artifacts.
          case "$REPO" in
            fintechbankx-platform-service-mesh-security|fintechbankx-platform-identity-keycloak-ldap|fintechbankx-platform-event-streaming)
              if ! rg -n "mode:\s*STRICT|PeerAuthentication" k8s security docs scripts --glob '*.{yaml,yml,md,sh}' 2>/dev/null; then
                echo "STRICT mTLS evidence not found for critical platform repo: $REPO"
                exit 1
              fi
              ;;
            *)
              echo "STRICT mTLS hard requirement is N/A for $REPO; baseline PERMISSIVE guard applied."
              ;;
          esac
